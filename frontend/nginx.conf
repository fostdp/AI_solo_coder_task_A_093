worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 65535;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time gzip=$gzip_ratio';

    access_log /var/log/nginx/seismograph.access.log main buffer=32k;
    error_log  /var/log/nginx/seismograph.error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;

    server_tokens off;

    # =====================================================
    # Gzip 压缩配置
    # =====================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;

    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/xml+rss
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        font/woff2
        image/svg+xml
        image/x-icon
        application/rss+xml
        application/atom_xml
        application/wasm;

    # Brotli (如果 ngx_brotli 模块可用)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    # =====================================================
    # 缓存策略
    # =====================================================
    map $sent_http_content_type $expires {
        default                    off;
        text/html                  epoch;
        text/css                   30d;
        application/javascript     30d;
        application/json           1h;
        image/png                  30d;
        image/jpeg                 30d;
        image/gif                  30d;
        image/svg+xml              30d;
        font/woff2                 365d;
        application/x-font-ttf     365d;
    }

    upstream seismograph_backend {
        server backend:8080;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # =====================================================
        # 静态资源
        # =====================================================
        location / {
            try_files $uri $uri/ /index.html;
            expires $expires;
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        location ~* \.(?:css|js|woff2?|ttf|eot|otf|png|jpg|jpeg|gif|ico|svg|webp)$ {
            expires $expires;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # =====================================================
        # API 反向代理
        # =====================================================
        location /api/ {
            proxy_pass         http://seismograph_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout  30s;
            proxy_send_timeout     60s;
            proxy_read_timeout     300s;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # =====================================================
        # Prometheus 指标端点
        # =====================================================
        location /metrics {
            proxy_pass         http://seismograph_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;

            access_log off;
        }

        # =====================================================
        # 安全头
        # =====================================================
        add_header X-Content-Type-Options    nosniff          always;
        add_header X-Frame-Options           SAMEORIGIN        always;
        add_header X-XSS-Protection          "1; mode=block"   always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # =====================================================
        # 错误页
        # =====================================================
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
